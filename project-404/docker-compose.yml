services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner
      POSTGRES_DB: scanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://scanner:scanner@postgres:5432/scanner
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production-32-chars!!
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://scanner:scanner@postgres:5432/scanner
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production-32-chars!!
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "
        echo 'Waiting for postgres...' &&
        sleep 5 &&
        DATABASE_URL=postgresql://scanner:scanner@postgres:5432/scanner
        alembic upgrade head
      "
    environment:
      DATABASE_URL: postgresql://scanner:scanner@postgres:5432/scanner
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
